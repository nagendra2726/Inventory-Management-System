<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Inventory Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0;
            border-radius: 0 0 2rem 2rem;
        }

        .avatar-lg {
            width: 120px;
            height: 120px;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="profile-header text-center position-relative">
        <a href="{{ url_for('dashboard') }}" class="btn btn-light position-absolute top-0 start-0 m-4 btn-sm">
            &larr; Back to Dashboard
        </a>
        <div class="position-relative d-inline-block">
            <img src="{{ user.PROFILE_IMAGE }}" alt="Avatar" id="profile-avatar"
                class="avatar-lg rounded-circle mx-auto mb-3 object-cover">
            <button class="btn btn-sm btn-light rounded-circle position-absolute bottom-0 end-0 mb-3"
                onclick="document.getElementById('avatar-input').click()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-camera"
                    viewBox="0 0 16 16">
                    <path
                        d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1v6zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2z" />
                    <path
                        d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5zm0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM3 6.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0z" />
                </svg>
            </button>
            <input type="file" id="avatar-input" class="hidden" accept="image/*" style="display: none;">
        </div>
        <h2 class="fw-bold">{{ user.FULL_NAME }}</h2>
        <p class="opacity-75">User ID: #{{ user.ID }} | Member since: {{ user.CREATED_AT[:10] }}</p>
    </div>

    <div class="container" style="margin-top: -2rem;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card mb-4 mt-1">
                    <div class="card-body p-4">
                        <div id="alert-placeholder"></div>

                        <h5 class="card-title fw-bold mb-4">Account Information</h5>
                        <form id="profile-form">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label text-muted small uppercase fw-bold">Full Name</label>
                                    <input type="text" class="form-control" name="full_name"
                                        value="{{ user.FULL_NAME }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small uppercase fw-bold">Phone Number</label>
                                    <input type="text" class="form-control" name="phone" value="{{ user.PHONE }}">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small uppercase fw-bold">Email Address</label>
                                <input type="email" class="form-control" name="email" value="{{ user.EMAIL }}">
                            </div>
                            <button type="submit" class="btn btn-primary px-4">Update Profile</button>
                        </form>

                        <hr class="my-5">

                        <h5 class="card-title fw-bold mb-4">Security</h5>
                        <form id="password-form">
                            <div class="mb-3">
                                <label class="form-label text-muted small uppercase fw-bold">Current Password</label>
                                <input type="password" class="form-control" name="current_password" required>
                            </div>
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label text-muted small uppercase fw-bold">New Password</label>
                                    <input type="password" class="form-control" name="new_password" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small uppercase fw-bold">Confirm New
                                        Password</label>
                                    <input type="password" class="form-control" name="confirm_new_password" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-outline-danger px-4">Change Password</button>
                        </form>

                        <div class="mt-5 text-center">
                            <a href="{{ url_for('store_settings') }}"
                                class="btn btn-outline-secondary btn-sm mb-2">Configure Store Information</a>
                            <br>
                            <a href="{{ url_for('logout') }}" class="btn btn-link text-danger">Logout from this
                                account</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showAlert(message, type) {
            const placeholder = document.getElementById('alert-placeholder');
            placeholder.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.getElementById('profile-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            const res = await fetch('/api/profile/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            showAlert(result.message || result.error, res.ok ? 'success' : 'danger');
        };

        document.getElementById('password-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            if (data.new_password !== data.confirm_new_password) {
                showAlert('New passwords do not match!', 'danger');
                return;
            }

            const res = await fetch('/api/profile/password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            showAlert(result.message || result.error, res.ok ? 'success' : 'danger');
            if (res.ok) e.target.reset();
        };

        document.getElementById('avatar-input').onchange = async (e) => {
            if (e.target.files.length === 0) return;

            const formData = new FormData();
            formData.append('file', e.target.files[0]);

            const res = await fetch('/api/profile/upload', {
                method: 'POST',
                body: formData
            });
            const result = await res.json();

            if (res.ok) {
                document.getElementById('profile-avatar').src = result.path + '?t=' + new Date().getTime();
                showAlert(result.message, 'success');
            } else {
                showAlert(result.error, 'danger');
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
