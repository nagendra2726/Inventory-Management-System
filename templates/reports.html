<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="/static/dashboard.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <!-- Main container with fixed screen height -->
    <div class="flex h-screen">
        <!-- Left Sidebar -->
        <aside class="w-64 bg-white p-6 flex flex-col justify-between shadow-md">
            <div>
                <div class="mb-8">
                    <div class="mb-8" data-aos="fade-down">
                        <h1 class="text-2xl font-bold text-center text-custom-purple tracking-tight">Naini General Store
                        </h1>
                    </div>
                </div>
                <nav>
                    <ul>
                        <li class="mb-2">
                            <a href="{{url_for('dashboard')}}"
                                class="flex items-center p-3 text-gray-600 hover:bg-gray-100 rounded-lg font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="sidebar-icon mr-3">
                                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                                </svg>
                                DASHBOARD
                            </a>
                        </li>
                        <li class="mb-2">
                            <a href="{{url_for('inventory_page')}}"
                                class="flex items-center p-3 text-gray-600 hover:bg-gray-100 rounded-lg font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="sidebar-icon mr-3">
                                    <path
                                        d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z">
                                    </path>
                                    <path d="m3.3 7 8.7 5 8.7-5"></path>
                                    <path d="M12 22V12"></path>
                                </svg>
                                INVENTORY
                            </a>
                        </li>
                        <li class="mb-2">
                            <a href="{{url_for('billing_page')}}"
                                class="flex items-center p-3 text-gray-600 hover:bg-gray-100 rounded-lg font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="sidebar-icon mr-3">
                                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2">
                                    </path>
                                    <rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect>
                                </svg>
                                BILLING
                            </a>
                        </li>
                        <li class="mb-2">
                            <a href="{{url_for('reports_hub')}}"
                                class="flex items-center p-3 bg-purple-100 text-purple-700 rounded-lg font-semibold">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="sidebar-icon mr-3">
                                    <path d="M3 3v18h18"></path>
                                    <path d="M18.7 8a6 6 0 0 0-8.4-8.4"></path>
                                    <path d="M13 10.5a2.5 2.5 0 0 1-3.5-3.5"></path>
                                </svg>
                                REPORTS
                            </a>
                        </li>
                        <li>
                            <a href="{{url_for('about')}}"
                                class="flex items-center p-3 text-gray-600 hover:bg-gray-100 rounded-lg font-medium">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="sidebar-icon mr-3">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M12 16v-4"></path>
                                    <path d="M12 8h.01"></path>
                                </svg>
                                ABOUT
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
            <div class="mt-auto">
                <a href="{{url_for('profile')}}" class="flex items-center p-3 hover:bg-gray-100 rounded-lg sidebar-link"
                    data-aos="fade-up" data-aos-delay="500">
                    <img src="{{ g.user.PROFILE_IMAGE }}" alt="User Avatar"
                        class="w-10 h-10 rounded-full mr-3 object-cover">
                    <div class="overflow-hidden">
                        <p class="font-semibold text-gray-700 truncate">{{ g.user.FULL_NAME }}</p>
                        <p class="text-sm text-gray-400">My Profile</p>
                    </div>
                </a>
                <a href="{{url_for('logout')}}"
                    class="flex items-center p-3 mt-2 text-red-500 hover:bg-red-50 rounded-lg sidebar-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="mr-3">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </a>
            </div>
        </aside>
        <!-- Main Content -->
        <main class="flex-1 p-8 lg:p-12">
            <header class="mb-8">
                <h1 class="text-4xl font-bold text-gray-800">Analysis & Reports</h1>
            </header>
            <div class="bg-white p-8 rounded-2xl shadow-lg">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">

                    <a href="/credit_report"
                        class="flex flex-col items-center justify-center p-6 bg-gray-50 rounded-xl hover:shadow-md hover:bg-white transition-all cursor-pointer border border-gray-200">
                        <img src="https://img.icons8.com/color/96/000000/csv.png" alt="CSV Icon"
                            class="h-20 w-20 mb-3" />
                        <p class="font-semibold text-gray-700 text-center">Credit Report</p>
                    </a>

                    <a href="#"
                        class="flex flex-col items-center justify-center p-6 bg-gray-50 rounded-xl hover:shadow-md hover:bg-white transition-all cursor-pointer border border-gray-200">
                        <img src="https://img.icons8.com/color/96/000000/combo-chart.png" alt="Chart Icon"
                            class="h-20 w-20 mb-3" />
                        <p class="font-semibold text-gray-700 text-center">Power BI Dashboard</p>
                        <span class="text-xs text-gray-400 mt-1">(External Link)</span>
                    </a>

                    <a href="{{ url_for('stock_report') }}"
                        class="flex flex-col items-center justify-center p-6 bg-gray-50 rounded-xl hover:shadow-md hover:bg-white transition-all cursor-pointer border border-gray-200">
                        <img src="https://img.icons8.com/color/96/000000/box-important.png" alt="Stock Icon"
                            class="h-20 w-20 mb-3" />
                        <p class="font-semibold text-gray-700 text-center">Stock Report</p>
                    </a>

                    <a href="{{ url_for('customer_report') }}"
                        class="flex flex-col items-center justify-center p-6 bg-gray-50 rounded-xl hover:shadow-md hover:bg-white transition-all cursor-pointer border border-gray-200">
                        <img src="https://img.icons8.com/color/96/000000/user-folder.png" alt="Customer Icon"
                            class="h-20 w-20 mb-3" />
                        <p class="font-semibold text-gray-700 text-center">Customer Report</p>
                    </a>

                    <a href="{{ url_for('order_history') }}"
                        class="flex flex-col items-center justify-center p-6 bg-gray-50 rounded-xl hover:shadow-md hover:bg-white transition-all cursor-pointer border border-gray-200">
                        <img src="https://img.icons8.com/color/96/000000/time-machine.png" alt="History Icon"
                            class="h-20 w-20 mb-3" />
                        <p class="font-semibold text-gray-700 text-center">Order History</p>
                    </a>
                </div>
            </div>
        </main>
    </div>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true
        });
    </script>
    <script src="/static/dashboard.js"></script>
</body>


</html>
