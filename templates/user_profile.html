<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Profile</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="/static/dashboard.css">


    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .sidebar-icon {
            width: 24px;
            height: 24px;
        }

        html,
        body {
            overflow: hidden;
        }

        .main-content-area {
            overflow-y: auto;
            height: 100vh;
        }

        .main-content-area::-webkit-scrollbar {
            width: 8px;
        }

        .main-content-area::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .main-content-area::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800">
    <div class="flex h-screen">
        <aside class="w-64 bg-white p-6 flex flex-col justify-between">
            <div>
                <div class="mb-8" data-aos="fade-down">
                    <h1 class="text-2xl font-bold text-center text-custom-purple tracking-tight">Naini General Store
                    </h1>
                </div>

                <!-- FIX: Added correct url_for links to the sidebar navigation -->
                <nav>
                    <ul>
                        <li class="mb-2">
                            <a href="{{ url_for('dashboard') }}"
                                class="flex items-center p-3 hover:bg-gray-100 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="mr-3">
                                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                                </svg>
                                DASHBOARD
                            </a>
                        </li>
                        <li class="mb-2">
                            <a href="{{ url_for('inventory_page') }}"
                                class="flex items-center p-3 hover:bg-gray-100 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="sidebar-icon mr-3">
                                    <path
                                        d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z">
                                    </path>
                                    <path d="m3.3 7 8.7 5 8.7-5"></path>
                                    <path d="M12 22V12"></path>
                                </svg>
                                INVENTORY
                            </a>
                        </li>
                        <li class="mb-2">
                            <a href="{{ url_for('billing_page') }}"
                                class="flex items-center p-3 hover:bg-gray-100 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="mr-3">
                                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2">
                                    </path>
                                    <rect width="8" height="4" x="8" y="2" rx="1" ry="1"></rect>
                                </svg>
                                BILLING
                            </a>
                        </li>
                        <li class="mb-2">
                            <a href="{{ url_for('reports_hub') }}"
                                class="flex items-center p-3 hover:bg-gray-100 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="mr-3">
                                    <path d="M3 3v18h18"></path>
                                    <path d="M18.7 8a6 6 0 0 0-8.4-8.4"></path>
                                    <path d="M13 10.5a2.5 2.5 0 0 1-3.5-3.5"></path>
                                </svg>
                                REPORTS
                            </a>
                        </li>
                        <li>
                            <a href="{{ url_for('about') }}" class="flex items-center p-3 hover:bg-gray-100 rounded-lg">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="mr-3">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M12 16v-4"></path>
                                    <path d="M12 8h.01"></path>
                                </svg>
                                ABOUT
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>

            <div class="flex items-center p-3 rounded-lg bg-violet-100 mt-auto">
                <a href="{{ url_for('profile') }}" class="flex items-center flex-1">
                    <img id="sidebarAvatar" src="https://placehold.co/40x40/E2E8F0/4A5568?text=OM" alt="User Avatar"
                        class="w-10 h-10 rounded-full mr-3 object-cover flex-shrink-0">
                    <div>
                        <p id="sidebarUsername" class="font-semibold text-gray-800 uppercase">OM KHEBADE</p>
                        <p class="text-sm text-gray-500">Store Admin</p>
                    </div>
                </a>
                <a href="{{ url_for('logout') }}" class="ml-auto text-red-500 hover:text-red-700 p-2" title="Logout">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </a>
            </div>
        </aside>

        <main class="flex-1 p-8 main-content-area">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Edit User Profile</h1>
                <button id="saveAllButton"
                    class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg shadow-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-opacity-75 transition-opacity">
                    Save All Changes
                </button>
            </div>

            <div id="notification" class="mb-4 text-center font-medium p-2 rounded-lg"></div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

                <div class="space-y-6">
                    <div class="bg-white p-6 rounded-xl shadow">
                        <h3 class="font-semibold text-lg mb-4">Your Photo</h3>
                        <div class="flex items-center gap-4">
                            <img id="profileImagePreview" src="/uploads/default-avatar.png"
                                class="w-20 h-20 rounded-full object-cover border" alt="Profile"
                                onerror="this.onerror=null; this.src='https://placehold.co/80x80/E2E8F0/4A5568?text=User';">
                            <input type="file" id="profileImageInput" class="hidden" accept="image/*">
                            <button onclick="document.getElementById('profileImageInput').click()"
                                class="px-4 py-2 bg-gray-200 text-gray-800 font-medium rounded-lg hover:bg-gray-300">
                                Upload New
                            </button>
                        </div>
                        <p class="text-sm text-gray-500 mt-3">This will be displayed on your profile.</p>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow">
                        <h3 class="font-semibold text-lg mb-4">Personal Information</h3>
                        <label for="fullName" class="block text-sm font-medium">Full Name</label>
                        <input type="text" id="fullName" class="w-full border rounded-lg px-3 py-2 mb-3 bg-gray-50">

                        <label for="email" class="block text-sm font-medium">Email</label>
                        <input type="email" id="email" class="w-full border rounded-lg px-3 py-2 mb-3 bg-gray-50">

                        <label for="phone" class="block text-sm font-medium">Phone Number</label>
                        <input type="text" id="phone" class="w-full border rounded-lg px-3 py-2 mb-3 bg-gray-50">

                        <label for="social" class="block text-sm font-medium">Social Media Account</label>
                        <input type="url" id="social" placeholder="https://..."
                            class="w-full border rounded-lg px-3 py-2 bg-gray-50">
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow">
                    <h3 class="font-semibold text-lg mb-4">Store Information</h3>

                    <label class="block text-sm font-medium">Store Logo</label>
                    <div class="flex gap-3 items-center mb-4">
                        <img id="logoImagePreview" src="/uploads/default-logo.png" alt="Store Logo"
                            class="w-16 h-16 rounded-lg object-cover border"
                            onerror="this.onerror=null; this.src='https://placehold.co/64x64/E2E8F0/4A5568?text=Logo';">
                        <input type="file" id="logoImageInput" class="hidden" accept="image/*">
                        <button onclick="document.getElementById('logoImageInput').click()"
                            class="px-4 py-2 bg-gray-200 text-gray-800 font-medium rounded-lg hover:bg-gray-300">
                            Upload New
                        </button>
                    </div>

                    <label for="storeName" class="block text-sm font-medium">Store Name</label>
                    <input type="text" id="storeName" class="w-full border rounded-lg px-3 py-2 mb-3 bg-gray-50">

                    <label for="storeNo" class="block text-sm font-medium">Store No.</label>
                    <input type="text" id="storeNo" class="w-full mb-3 p-2 border rounded-lg bg-gray-50">

                    <label for="address" class="block text-sm font-medium">Address</label>
                    <textarea id="address" class="w-full border rounded-lg px-3 py-2 mb-3 bg-gray-50"></textarea>

                    <label for="gstNumber" class="block text-sm font-medium">GST Number</label>
                    <input type="text" id="gstNumber" class="w-full border rounded-lg px-3 py-2 mb-3 bg-gray-50">

                    <label class="block text-sm font-medium">Shop License</label>
                    <div class="flex items-center gap-4">
                        <input type="file" id="licenseFileInput" class="hidden" accept=".pdf,.png,.jpg,.jpeg">
                        <button onclick="document.getElementById('licenseFileInput').click()"
                            class="px-4 py-2 bg-gray-200 text-gray-800 font-medium rounded-lg hover:bg-gray-300">
                            Upload License
                        </button>
                        <a id="licenseLink" href="#" target="_blank" class="text-indigo-600 hover:underline hidden">View
                            Current License</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const notificationEl = document.getElementById('notification');

            // --- Form Element References ---
            const fullNameInput = document.getElementById('fullName');
            const emailInput = document.getElementById('email');
            const phoneInput = document.getElementById('phone');
            const socialInput = document.getElementById('social');
            const storeNameInput = document.getElementById('storeName');
            const storeNoInput = document.getElementById('storeNo');
            const addressInput = document.getElementById('address');
            const gstNumberInput = document.getElementById('gstNumber');
            const profileImagePreview = document.getElementById('profileImagePreview');
            const logoImagePreview = document.getElementById('logoImagePreview');
            const licenseLink = document.getElementById('licenseLink');
            const sidebarAvatar = document.getElementById('sidebarAvatar');
            const sidebarUsername = document.getElementById('sidebarUsername');

            // --- File Inputs ---
            const profileImageInput = document.getElementById('profileImageInput');
            const logoImageInput = document.getElementById('logoImageInput');
            const licenseFileInput = document.getElementById('licenseFileInput');

            // --- Buttons ---
            const saveAllButton = document.getElementById('saveAllButton');

            const apiUrlBase = `${window.location.protocol}//${window.location.host}`;

            // Function to show notifications
            function showNotification(message, isError = false) {
                notificationEl.textContent = message;
                notificationEl.classList.remove('bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
                if (isError) {
                    notificationEl.classList.add('bg-red-100', 'text-red-800');
                } else {
                    notificationEl.classList.add('bg-green-100', 'text-green-800');
                }
                setTimeout(() => { notificationEl.textContent = ''; }, 3000);
            }

            // --- 1. Load Data on Page Start ---
            async function loadSettingsData() {
                try {
                    const url = new URL('/api/settings', apiUrlBase);
                    url.searchParams.append('_t', new Date().getTime());
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Failed to fetch settings.');

                    const data = await response.json();

                    if (Object.keys(data).length > 0) {
                        fullNameInput.value = data.FULL_NAME || '';
                        emailInput.value = data.EMAIL || '';
                        phoneInput.value = data.PHONE_NUMBER || '';
                        socialInput.value = data.SOCIAL_MEDIA || '';
                        storeNameInput.value = data.STORE_NAME || '';
                        storeNoInput.value = data.STORE_NO || '';
                        addressInput.value = data.ADDRESS || '';
                        gstNumberInput.value = data.GST_NUMBER || '';

                        if (data.PHOTO_URL) {
                            const photoUrl = `${data.PHOTO_URL}?_t=${new Date().getTime()}`;
                            profileImagePreview.src = photoUrl;
                            sidebarAvatar.src = photoUrl;
                        }
                        if (data.LOGO_URL) logoImagePreview.src = `${data.LOGO_URL}?_t=${new Date().getTime()}`;
                        if (data.LICENSE_URL) {
                            licenseLink.href = data.LICENSE_URL;
                            licenseLink.classList.remove('hidden');
                        }
                        if (data.FULL_NAME) {
                            sidebarUsername.textContent = data.FULL_NAME;
                        }
                    }

                } catch (error) {
                    console.error('Error loading data:', error);
                    showNotification(error.message, true);
                }
            }

            // --- 2. Save All Text Data ---
            async function saveAllSettings() {
                saveAllButton.disabled = true;
                saveAllButton.textContent = 'Saving...';

                const dataToSave = {
                    fullName: fullNameInput.value,
                    email: emailInput.value,
                    phone: phoneInput.value,
                    social: socialInput.value,
                    storeName: storeNameInput.value,
                    storeNo: storeNoInput.value,
                    address: addressInput.value,
                    gstNumber: gstNumberInput.value,
                };

                try {
                    const response = await fetch(new URL('/api/settings', apiUrlBase), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dataToSave),
                    });
                    const result = await response.json();
                    if (!response.ok) throw new Error(result.error || 'Failed to save settings.');

                    showNotification(result.message);
                    // Refresh sidebar with new name
                    if (dataToSave.fullName) {
                        sidebarUsername.textContent = dataToSave.fullName;
                    }
                } catch (error) {
                    console.error('Error saving data:', error);
                    showNotification(error.message, true);
                } finally {
                    saveAllButton.disabled = false;
                    saveAllButton.textContent = 'Save All Changes';
                }
            }

            // --- 3. Upload a File (Photo, Logo, License) ---
            async function uploadFile(file, uploadType) {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('type', uploadType);

                try {
                    const response = await fetch(new URL('/api/upload-file', apiUrlBase), {
                        method: 'POST',
                        body: formData,
                    });
                    const result = await response.json();
                    if (!response.ok) throw new Error(result.error || 'File upload failed.');

                    showNotification(result.message);

                    const newPath = `${result.path}?_t=${new Date().getTime()}`;

                    if (uploadType === 'profile') {
                        profileImagePreview.src = newPath;
                        sidebarAvatar.src = newPath;
                    }
                    if (uploadType === 'logo') logoImagePreview.src = newPath;
                    if (uploadType === 'license') {
                        licenseLink.href = result.path; // No cache bust for license link
                        licenseLink.classList.remove('hidden');
                    }

                } catch (error) {
                    console.error(`Error uploading ${uploadType}:`, error);
                    showNotification(error.message, true);
                }
            }

            // --- Event Listeners ---
            saveAllButton.addEventListener('click', saveAllSettings);

            profileImageInput.addEventListener('change', (e) => {
                if (e.target.files[0]) uploadFile(e.target.files[0], 'profile');
            });

            logoImageInput.addEventListener('change', (e) => {
                if (e.target.files[0]) uploadFile(e.target.files[0], 'logo');
            });

            licenseFileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) uploadFile(e.target.files[0], 'license');
            });

            // --- Initial Load ---
            loadSettingsData();
        });
    </script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true
        });
    </script>
    <script src="/static/dashboard.js"></script>
</body>

</html>
